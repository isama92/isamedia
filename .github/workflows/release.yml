name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            archive: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      # The tag's tree already has the release-plz version bump in Cargo.toml +
      # Cargo.lock, so --locked is valid and the binary reports the right
      # --version.
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          version="${{ github.event.release.tag_name }}"
          name="isamedia-${version}-${{ matrix.target }}"
          bindir="target/${{ matrix.target }}/release"
          mkdir -p dist
          tar -czf "dist/${name}.tar.gz" -C "$bindir" isamedia
          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}"
          $name = "isamedia-$version-${{ matrix.target }}"
          $bin = "target/${{ matrix.target }}/release/isamedia.exe"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path $bin -DestinationPath "dist/$name.zip"
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"

      - name: Upload assets to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber
