# Disable mpv's built-in OSC so ModernZ can take over
osc=no

# Borderless window: ModernZ draws its own title bar and window controls.
# On Wayland this hides the title bar but keeps resize borders.
# If the OS title bar still shows on your setup, use "border=no" instead.
title-bar=no

# ModernZ manages subtitle position; stop watch-later from restoring a stale
# sub-pos that fights with it (ModernZ warns about this otherwise).
watch-later-options-remove=sub-pos

# No big centred OSD bar when changing volume or seeking.
# Volume still shows the small "Volume: X%" text; seeks show a time text.
# Set osd-on-seek=no if you want no seek feedback at all.
osd-bar=no
osd-on-seek=msg

# Screenshots: save to ~/Pictures/Screenshots as mpv_YYYY-MM-DD_HH-MM-SS.<ext>
screenshot-directory=~/Pictures/Screenshots
screenshot-template=mpv_%tY-%tm-%td_%tH-%tM-%tS

