# Volume
UP                  add volume 5
DOWN                add volume -5
w                   add volume 5
s                   add volume -5
m                   cycle mute

# Subtitles
c                   cycle sub-visibility
Ctrl+LEFT           add sub-delay -0.1
Ctrl+RIGHT          add sub-delay 0.1
Ctrl+a              add sub-delay -0.1
Ctrl+d              add sub-delay 0.1

# Seek
LEFT                seek -5 exact
RIGHT               seek 5 exact
Shift+LEFT          seek -1 exact
Shift+RIGHT         seek 1 exact
Ctrl+Shift+LEFT     seek -30
Ctrl+Shift+RIGHT    seek 30
a                   seek -5 exact
d                   seek 5 exact
A                   seek -1 exact
D                   seek 1 exact
Ctrl+A              seek -30
Ctrl+D              seek 30

# Speed
+                   add speed 0.1
-                   add speed -0.1
=                   set speed 1.0

# System
f                   cycle fullscreen
ESC                 set fullscreen no
b                   script-message osc-visibility cycle
q                   quit
Q                   quit-watch-later
CLOSE_WIN           quit
SPACE               cycle pause
<                   playlist-prev
>                   playlist-next
MBTN_LEFT           cycle pause
MBTN_LEFT_DBL       cycle fullscreen

# Media keys
MUTE                cycle mute
VOLUME_UP           add volume 5
VOLUME_DOWN         add volume -5
PLAY                cycle pause
PLAYPAUSE           cycle pause
PLAYONLY            set pause no
PAUSEONLY           set pause yes

# Menu
MBTN_RIGHT          script-binding select/menu
h                   script-binding select/menu
g-a                 script-binding select/select-aid
g-b                 script-binding select/select-binding
g-c                 script-binding select/select-chapter
g-d                 script-binding select/select-audio-device
g-e                 script-binding select/select-edition
g-h                 script-binding select/select-watch-history
g-l                 script-binding select/select-subtitle-line
g-m                 script-binding select/menu
g-p                 script-binding select/select-playlist
g-r                 script-binding select/show-properties
g-s                 script-binding select/select-sid
g-S                 script-binding select/select-secondary-sid
g-t                 script-binding select/select-track
g-v                 script-binding select/select-vid
g-w                 script-binding select/select-watch-later

